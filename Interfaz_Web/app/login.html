<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/forms.css">
    <title>Inicio de sesión</title>
</head>
<body>
    <main class="main-content">
        <div class="form-container" id="register-container">
            <div class="title-form">
                <h1>StockBot</h1>
                <h2>Inicia sesión</h2>
                <p>Accede a tu cuenta para gestionar tu almacén.</p>
            </div>
            <form id="register-form" class="form-stockbot">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input 
                        type="text"
                        id="email"
                        class="form-input"
                        name="email"
                        placeholder="tu@gmail.com"
                        required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <input 
                        type="password"
                        id="password"
                        class="form-input"
                        name="password"
                        placeholder="Escribe una contraseña"
                        required>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn-crear">Iniciar sesión</button>
                    <a class="btn-cancelar" href="./register.html">Regístrate aquí</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
