<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockBot</title>

    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/index.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
</head>

<body>
    <header>
        <div id="title">
            <h1>StockBot</h1>
        </div>
        <form id="connection_container">
            <input id="address" type="text" placeholder="Dirección del robot">
            <button id="connection_button" type="submit">➜</button>
        </form>
    </header>

    <main id="control_panel" style="padding: 2rem; text-align: center;">

        <div class="main-content">
            <div id="inventario">
                <h2>Control de Búsqueda de Inventario</h2>
                
                <p>Selecciona el destino para buscar el producto:</p>
                <button onclick="sendRobot(1)">Ir al punto 1 (Estantería)</button>
                <button onclick="sendRobot(2)">Ir al punto 2 (Cajas)</button>
                
                <div style="margin-top: 20px;">
                    <h3>Estado de Búsqueda:</h3>
                    <p id="status_text" style="font-weight: bold; font-size: 1.2em;">Esperando orden...</p>
                </div>

                <div class="patrol-management">
                    <h3>Gestión de Patrulla</h3>
                    <button onclick="controlPatrol(1)" class="btn-control btn-start">Activar Patrulla</button>
                    <button onclick="controlPatrol(0)" class="btn-control btn-stop">Parar Patrulla</button>
                </div>
            </div>
            
            <div id="divCamera">
                <img id="cameraFeed" src="http://localhost:8080/stream topic=/camera/image.raw">
            </div>
        </div>
    </main>

    <script src="scripts/connection.js"></script>
    <script src="scripts/camera.js"></script>
</body>

</html>
